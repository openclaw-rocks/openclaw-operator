name: Stale

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close stale issues and PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 14
          days-before-close: 7
          stale-issue-label: stale
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 7 days if no further activity occurs.
            If this issue is still relevant, please leave a comment or remove the stale label.
          close-issue-message: >
            This issue was closed because it has been stale for 7 days with no activity.
            Feel free to reopen if this is still relevant.
          stale-pr-label: stale
          days-before-pr-stale: 7
          days-before-pr-close: 7
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not had
            recent activity. It will be closed in 7 days if no further activity occurs.
            If this PR is still relevant, please push updates or leave a comment.
          close-pr-message: >
            This pull request was closed because it has been stale for 7 days with no activity.
            Feel free to reopen if this is still relevant.
          exempt-issue-labels: pinned,security,enhancement
          exempt-pr-labels: pinned,security
          exempt-all-milestones: true
